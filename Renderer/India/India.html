<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <title>Responsive State Map</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1e1e2f;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Courier New', monospace;
      padding: 20px;
    }

   
    #state-input {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    #state-input input {
      flex: 1;
      max-width: 300px;
      padding: 10px 14px;
      border: none;
      border-radius: 8px 0 0 8px;
      font-size: 1rem;
      outline: none;
      background: #0a0a14;
      color: #0ff;
      border: 1px solid #0ff;
    }

    #state-input button {
      padding: 10px 18px;
      border: none;
      border-radius: 0 8px 8px 0;
      font-size: 1rem;
      cursor: pointer;
      background: #0ff;
      color: #0a0a14;
      font-weight: bold;
      transition: background 0.3s;
    }

    #state-input button:hover {
      background: #5af;
    }

    /* Map Wrapper */
    .map-wrapper {
      position: relative;
      width: 100%;
      max-width: 1200px;
      max-height: 80vh;          
      aspect-ratio: 1 / 1;       
      margin: 0 auto;
      background: #0a0a14;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      padding: 10px;
    }

    .map-svg {
      width: 100%;
      height: 100%;
      display: block;
      background: #0a0a14;
      border-radius: 16px;
    }

    .state {
      stroke: #2c3e50;
      stroke-width: 1.2;
      transition: fill 0.2s, stroke 0.2s;
      cursor: pointer;
    }

    .state:hover {
      fill: #5a6e8a !important;
      stroke: white;
      stroke-width: 1.8;
    }

    .tooltip {
      position: fixed;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      color: #0ff;
      padding: 6px 12px;
      border-left: 3px solid #0ff;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.9rem;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
      transition: opacity 0.1s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: cyan;
      font-family: monospace;
      background: rgba(0,0,0,0.7);
      padding: 12px 24px;
      border-radius: 30px;
      z-index: 20;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }

    @media (max-width: 600px) {
      #state-input input {
        max-width: 200px;
        font-size: 0.9rem;
      }
      #state-input button {
        font-size: 0.9rem;
        padding: 8px 14px;
      }
      .tooltip {
        font-size: 0.7rem;
        padding: 4px 10px;
      }
    }
  </style>
</head>
<body>

 
  <div class="map-wrapper">
    <div class="loader">RENDERING INDIA MAP....</div>
    <svg class="map-svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <script type="module" src="IndiaGeo.js"></script>

</body>
</html>
